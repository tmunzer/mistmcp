troubleshoot:
  type: tool_consolidation
  tags: [marvis]
  description: |-
    Troubleshoot sites, devices, clients, and wired clients for maximum of last 7 days from current time. Use the `mist_search_client` tool to find a client MAC Address. Use the `mist_search_device` tool to find device MAC Address. **NOTE**: requires Marvis subscription license
  read_only_hint: true
  destructive_hint: false
  parameters:
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to run the troubleshooting query for
      required: true
    - name: troubleshoot_type
      schema:
        type: string
        enum: [wan, wired, wireless]
      description: Type of troubleshooting query to run. Possible values are `wan`, `wired`, and `wireless`. If `wan` is selected, the query will troubleshoot the WAN. If `wired` is selected, the query will troubleshoot the wired network. If `wireless` is selected, the query will troubleshoot the wireless network.
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Used to troubleshoot a whole site. ID of the site to run the troubleshooting query for
      required: false
    - name: mac
      schema:
        type: string
      description: Used to troubleshoot a specific client or device. MAC address of the client or device to run the troubleshooting query for. Not required if troubleshooting a whole site with `site_id`
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
  requests:
    default:
      get:
        operationId: troubleshootOrg
        function: mistapi.api.v1.orgs.troubleshoot.troubleshootOrg(apisession, org_id=str(org_id), site_id=str(site_id) if site_id else None, type=troubleshoot_type.value, mac=str(mac) if mac else None, start=str(start) if start else None, end=str(end) if end else None )
