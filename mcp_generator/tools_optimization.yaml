searchClient:
  type: tool_consolidation
  tags: [clients]
  description: |-
    Search for clients across an organization or specific site. 
    Supports searching by client type (WAN, wired, wireless, NAC), MAC address, hostname, IP address, and more.
    Use wildcards (*) for partial matches on MAC address, hostname, IP, and text fields.
    Different client types support different filter parameters - the tool will validate compatibility.
  read_only_hint: true
  destructive_hint: false
  match_name: client_type
  parameters:
    - name: client_type
      schema:
        type: string
        enum: [wired, wireless, wan, nac]
      description: "Type of client: WAN, wired, wireless, or NAC"
      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to search for clients in
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID for site-level search (optional)
      required: false
    - name: device_mac
      schema:
        type: string
      description: Partial / full MAC Address of the Access Point or the Switch. Use `prefix*` for prefix search or `*substring*` for contains search (e.g. `aabbcc*` and `*bbcc*` match `aabbccddeeff`). Suffix-only wildcards (e.g. `*bccddeeff`) are not supported
      required: false
    - name: band
      schema:
        type: string
        enum: ["24", "5", "6"]
      description: 802.11 band (24 or 5 or 6 GHz). Wireless clients only
      required: false
      only_if:
        client_type:
          - wireless
    - name: ssid
      schema:
        type: string
      description: SSID name. Wireless or NAC clients only
      required: false
      only_if:
        client_type:
          - wireless
          - nac
    - name: mac
      schema:
        type: string
      description: Partial / full Client MAC Address. Use `prefix*` for prefix search or `*substring*` for contains search (e.g. `aabbcc*` and `*bbcc*` match `aabbccddeeff`). Suffix-only wildcards (e.g. `*bccddeeff`) are not supported
      required: false
    - name: hostname
      schema:
        type: string
      description: Partial / full Client hostname. Use `prefix*` for prefix search or `*substring*` for contains search (e.g. `everest*` and `*rest*` match `my-everest-client`). Suffix-only wildcards (e.g. `*everest`) are not supported. Not applicable for WAN or wired clients
      required: false
    - name: ip
      schema:
        type: string
      description: Partial / full Client IP Address.  Use `prefix*` for prefix search or `*substring*` for contains search (e.g. `10.100.10.*` and  `*100.10.*` match `10.100.10.54`). Suffix-only wildcards (e.g. `*.54`) are not supported. Not applicable for NAC clients
      required: false
    - name: text
      schema:
        type: string
      description: Free text search in client details (supports * wildcard). Not applicable for WAN clients
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    wan:
      list:
        operationId: searchOrgWanClients
        function: mistapi.api.v1.orgs.wan_clients.searchOrgWanClients(apisession, org_id=str(org_id), site_id=str(site_id) if site_id else None, mac=str(mac) if mac else None, hostname=str(hostname) if hostname else None, ip=str(ip) if ip else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )
    wired:
      list:
        operationId: searchOrgWiredClients
        function: mistapi.api.v1.orgs.wired_clients.searchOrgWiredClients(apisession, org_id=str(org_id), site_id=str(site_id) if site_id else None, device_mac=str(device_mac) if device_mac else None, mac=str(mac) if mac else None, ip=str(ip) if ip else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )
    wireless:
      list:
        operationId: searchOrgWirelessClients
        function: mistapi.api.v1.orgs.clients.searchOrgWirelessClients(apisession, org_id=str(org_id), site_id=str(site_id) if site_id else None, ap=str(device_mac) if device_mac else None, band=str(band) if band else None, ssid=str(ssid) if ssid else None, mac=str(mac) if mac else None, hostname=str(hostname) if hostname else None, ip=str(ip) if ip else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )
    nac:
      list:
        operationId: searchOrgNacClients
        function: mistapi.api.v1.orgs.nac_clients.searchOrgNacClients(apisession, org_id=str(org_id), site_id=str(site_id) if site_id else None, ssid=str(ssid) if ssid else None, mac=str(mac) if mac else None, hostname=str(hostname) if hostname else None, text=str(text) if text else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )

listRogueDevices:
  type: tool_consolidation
  tags: [sites_rogues]
  description: |-
    Retrieve a list of rogue devices (APs or clients) for a site, with optional filters for rogue AP type and time range
  read_only_hint: true
  destructive_hint: false
  match_name: rogue_type
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the site to retrieve rogue devices for
      required: true
    - name: rogue_type
      schema:
        type: string
        enum: [ap, client]
      description: Type of rogue device to filter by
      required: true
    # - name: rogue_bssid
    #   schema:
    #     type: string
    #   description: BSSID of the rogue device to filter by. Only applicable when filtering for rogue APs
    #   required: false
    - name: rogue_ap_type
      schema:
        type: string
        enum: [honeypot, lan, others, spoof]
      description: Type of rogue AP to filter by. Only applicable when filtering for rogue APs
      required: false
      only_if:
        rogue_type:
          - ap
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    ap:
      list:
        operationId: listSiteRogueAPs
        function: mistapi.api.v1.sites.insights.listSiteRogueAPs(apisession, site_id=str(site_id), type=rogue_ap_type.value if rogue_ap_type else None, limit=limit, start=str(start) if start else None, end=str(end) if end else None )
      # get:
      #   operationId: getSiteRogueAP
      #   function: mistapi.api.v1.sites.rogues.getSiteRogueAP(apisession, site_id=str(site_id), rogue_bssid=rogue_bssid)
    client:
      list:
        operationId: listSiteRogueClients
        function: mistapi.api.v1.sites.insights.listSiteRogueClients(apisession, site_id=str(site_id), limit=limit, start=str(start) if start else None, end=str(end) if end else None )

listSiteSleInfo:
  type: tool_consolidation
  tags: [sles]
  description: List SLE metadata for a site scope. Use metrics to list available SLE metrics for a given scope, or classifiers to list the classifiers available for a specific metric.
  read_only_hint: true
  destructive_hint: false
  match_name: query_type
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID
      required: true
    - name: query_type
      schema:
        type: string
        enum: [metrics, classifiers]
      description: "Type of metadata to retrieve: metrics returns the list of available SLE metrics for the given scope; classifiers returns the list of classifiers for a specific metric (requires metric parameter)"
      required: true
    - name: scope
      schema:
        type: string
        enum: [ap, client, gateway, site, switch]
      description: "Scope of the SLE data: site, ap, client, gateway, or switch"
      required: true
    - name: scope_id
      schema:
        type: string
      description: "ID of the scoped object: `site_id` if `scope=site`; `device_id` if `scope=ap`, `switch`, or `gateway`; `MAC address` if `scope=client`"
      required: true
    - name: metric
      schema:
        type: string
      description: SLE metric name to retrieve classifiers for. Required when query_type is classifiers. Use query_type=metrics first to discover available metric names
      required: false
      required_if:
        test:
          - classifiers
  requests:
    metrics:
      list:
        operationId: listSiteSlesMetrics
        function: mistapi.api.v1.sites.sle.listSiteSlesMetrics(apisession, site_id=str(site_id), scope=scope.value, scope_id=scope_id)
    classifiers:
      list:
        operationId: listSiteSleMetricClassifiers
        function: mistapi.api.v1.sites.sle.listSiteSleMetricClassifiers(apisession, site_id=str(site_id), scope=scope.value, scope_id=scope_id, metric=metric)

searchAlarms:
  type: tool_consolidation
  tags: [events]
  description: |-
    Search for raised alarms in an organization or site with optional filtering. 
      
    Scopes:
    - `org`: Search all alarms across the organization
    - `site`: Search alarms in a specific site (requires `site_id`)
    - `suppressed`: View temporarily disabled alarms across the organization

    Alarm groups: `infrastructure` (network device/connectivity issues), `marvis` (AI-driven network detections), `security` (security events)

    Common Marvis alarm types: `bad_cable`, `bad_wan_uplink`, `dns_failure`, `arp_failure`, `auth_failure`, `dhcp_failure`, `missing_vlan`, `negotiation_mismatch`, `port_flap`

    For a complete list of alarm types, use `mist_get_constants` with `object_type=alarm_definitions`.
  read_only_hint: true
  destructive_hint: false
  match_name: scope
  parameters:
    - name: org_id
      schema:
        type: string
        format: uuid
      description: Organization ID
      required: true
    - name: scope
      schema:
        type: string
        enum: [org, site, suppressed]
      description: "Search scope: `org` (organization-wide), `site` (specific site, requires site_id), or `suppressed` (disabled alarms)"
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID. Can be used to filter alarms for a specific site. Required if `scope` is set to `site`
      required: false
      required_if:
        scope:
          - site
    - name: group
      schema:
        type: string
      description: "Only for org/site scope. Alarm group. enum: `infrastructure`, `marvis`, `security`.  The `marvis` group is used to retrieve AI-driven network issue detections."
      only_if:
        scope:
          - org
          - site
    - name: severity
      schema:
        type: string
      description: "Only for org/site scope.Severity of the alarm. enum: `critical`, `major`, `minor`, `warn`, `info`"
      only_if:
        scope:
          - org
          - site
    - name: alarm_type
      schema:
        type: string
      description: "Only for org/site scope. Comma separated list of types of the alarm (e.g., 'bad_cable,auth_failure'). IMPORTANT: use the `mist_get_constants` tool with `object_type=alarm_definitions`to get the list of possible alarm types"
      only_if:
        scope:
          - org
          - site
    - name: acked
      schema:
        type: boolean
      description: Only for org/site scope. Whether to filter for acknowledged (true) or unacknowledged (false) alarms
      only_if:
        scope:
          - org
          - site
    - name: start
      schema:
        type: integer
      description: Only for org/site scope. Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: Only for org/site scope. End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Only for org/site scope. Max number of results to return (max 1000)
      required: false
  requests:
    org:
      list:
        operationId: searchOrgAlarms
        function: mistapi.api.v1.orgs.alarms.searchOrgAlarms(apisession,org_id=str(org_id),group=group if group else None,severity=severity if severity else None,type=alarm_type if alarm_type else None,acked=acked if acked else None,start=str(start) if start else None,end=str(end) if end else None,limit=limit,)
    site:
      list:
        operationId: searchSiteAlarms
        function: mistapi.api.v1.sites.alarms.searchSiteAlarms(apisession,site_id=str(site_id),group=group if group else None,severity=severity if severity else None,type=alarm_type if alarm_type else None,acked=acked if acked else None,start=str(start) if start else None,end=str(end) if end else None,limit=limit,)
    suppressed:
      list:
        operationId: listOrgSuppressedAlarms
        function: mistapi.api.v1.orgs.alarmtemplates.listOrgSuppressedAlarms(apisession, org_id=str(org_id))

searchDeviceConfigHistory:
  type: tool_consolidation
  tags: [configuration]
  description: |-
    Search for entries in device config history. 
    This tool can be used to track configuration changes over time, useful for troubleshooting issues that started after a config change.
  read_only_hint: true
  destructive_hint: false
  match_name: query_type
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID of the device to search config history for
      required: true
    - name: query_type
      schema:
        type: string
        enum: [history, last_configs]
      description: Whether to search for config history entries or just retrieve the last config entry for each device
      required: true
    - name: device_type
      schema:
        type: string
        enum: [ap, switch, gateway]
      description: Type of device to search config history for
      required: true
    - name: device_mac
      schema:
        type: string
      description: MAC address of the device to search config history for
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    history:
      list:
        operationId: searchSiteDeviceConfigHistory
        function: mistapi.api.v1.sites.devices.searchSiteDeviceConfigHistory(apisession, site_id=str(site_id), type=device_type.value if device_type else None, mac=str(device_mac) if device_mac else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )
    last_configs:
      list:
        operationId: searchSiteDeviceLastConfigs
        function: mistapi.api.v1.sites.devices.searchSiteDeviceLastConfigs(apisession, site_id=str(site_id), device_type=device_type.value if device_type else None, mac=str(device_mac) if device_mac else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit)

searchNacUserMacs:
  type: tool_consolidation
  tags: [orgs_nac]
  description: |-
    Search for NAC user MAC addresses in an organization or site, with optional filters for associated SSID and time range. User MACs are used to perform MAC Authentication with Juniper Mist NAC.
  read_only_hint: true
  destructive_hint: false
  if_filter: usermac_id
  parameters:
    - name: org_id
      schema:
        type: string
        format: uuid
      description: Organization ID to search for NAC endpoints in
      required: true
    - name: usermac_id
      schema:
        type: string
      description: ID of the User MAC address to return details for. If specified, other filters are ignored and details for the specified User MAC address is returned if it exists
      required: false
    - name: mac
      schema:
        type: string
      description: Partial / full Client MAC Address. Use `prefix*` for prefix search or `*substring*` for contains search (e.g. `aabbcc*` and `*bbcc*` match `aabbccddeeff`). Suffix-only wildcards (e.g. `*bccddeeff`) are not supported
      required: false
    - name: labels
      schema:
        type: array
        items:
          type: string
      description: Comma separated list of labels to filter NAC endpoints by. A NAC endpoint must have all the specified labels to be included in the results
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    default:
      list:
        operationId: searchOrgUserMacs
        function: mistapi.api.v1.orgs.usermacs.searchOrgUserMacs(apisession, org_id=str(org_id), mac=str(mac) if mac else None, labels=labels if labels else None, limit=limit )
      get:
        operationId: getOrgUserMac
        function: mistapi.api.v1.orgs.usermacs.getOrgUserMac(apisession, org_id=str(org_id), usermac_id=str(usermac_id) )

