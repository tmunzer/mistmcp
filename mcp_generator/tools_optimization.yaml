      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to retrieve audit logs for
      required: false
      required_if:
        scope:
          - org
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: message
      schema:
        type: string
      description: Message to filter audit logs by (partial search)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    self:
      list:
        operationId: listSelfAuditLogs
