listUpgrades:
  type: tool_consolidation
  tags: [utilities_upgrade]
  description: Retrieve upgrade-related information for the organization. Use device types (ap, switch, srx, mxedge, ssr) to list or retrieve upgrade jobs. Use available_device_versions to list available firmware versions for AP/switch/gateway devices. Use available_ssr_versions to list available SSR firmware versions.
  read_only_hint: true
  destructive_hint: false
  match_name: device_type
  if_filter: upgrade_id
  parameters:
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the site. Required when device_type is site_mxedge
      required: false
      required_if:
        device_type:
          - site_mxedge
    - name: device_type
      schema:
        type: string
        enum:
          [
            ap,
            switch,
            srx,
            org_mxedge,
            site_mxedge,
            ssr,
            available_device_versions,
            available_ssr_versions,
          ]
      required: true
      description: "Type of query: use ap/switch/srx/org_mxedge/site_mxedge/ssr to list upgrade jobs for that device type; use available_device_versions to list available firmware versions for AP/switch/gateway devices; use available_ssr_versions to list available SSR firmware versions"
    - name: upgrade_id
      schema:
        type: string
        format: uuid
      description: ID of a specific upgrade job to retrieve. Only applicable when device_type is ap, switch, srx, org_mxedge, site_mxedge, or ssr
      only_if:
        device_type:
          - ap
          - switch
          - srx
          - org_mxedge
          - site_mxedge
          - ssr
    - name: firmware_type
      schema:
        type: string
        enum: [ap, switch, gateway]
      description: Device model type to filter available firmware versions by. Only applicable when device_type is available_device_versions
      only_if:
        device_type:
          - available_device_versions
    - name: model
      schema:
        type: string
      description: Device model to filter available firmware versions by. Only applicable when device_type is available_device_versions
      only_if:
        device_type:
          - available_device_versions
    - name: channel
      schema:
        type: string
        enum: [alpha, beta, stable]
      description: SSR firmware release channel to filter by. Only applicable when device_type is available_ssr_versions. Defaults to stable
      only_if:
        device_type:
          - available_ssr_versions
    - name: mac
      schema:
        type: string
      description: MAC address (or comma-separated list) of SSR device(s) to retrieve available versions for. Only applicable when device_type is available_ssr_versions
      only_if:
        device_type:
          - available_ssr_versions
  requests:
    ap:
      list:
        operationId: listOrgDeviceUpgrades
        function: mistapi.api.v1.orgs.devices.listOrgDeviceUpgrades(apisession, org_id=str(org_id))
      get:
        operationId: getOrgDeviceUpgrade
        function: mistapi.api.v1.orgs.devices.getOrgDeviceUpgrade(apisession, org_id=str(org_id), upgrade_id=str(upgrade_id))
    switch:
      list:
        operationId: listOrgDeviceUpgrades
        function: mistapi.api.v1.orgs.devices.listOrgDeviceUpgrades(apisession, org_id=str(org_id))
      get:
        operationId: getOrgDeviceUpgrade
        function: mistapi.api.v1.orgs.devices.getOrgDeviceUpgrade(apisession, org_id=str(org_id), upgrade_id=str(upgrade_id))
    srx:
      list:
        operationId: listOrgDeviceUpgrades
        function: mistapi.api.v1.orgs.devices.listOrgDeviceUpgrades(apisession, org_id=str(org_id))
      get:
        operationId: getOrgDeviceUpgrade
        function: mistapi.api.v1.orgs.devices.getOrgDeviceUpgrade(apisession, org_id=str(org_id), upgrade_id=str(upgrade_id))
    org_mxedge:
      list:
        operationId: listOrgMxEdgeUpgrades
        function: mistapi.api.v1.orgs.mxedges.listOrgMxEdgeUpgrades(apisession, org_id=str(org_id))
      get:
        operationId: getOrgMxEdgeUpgrade
        function: mistapi.api.v1.orgs.mxedges.getOrgMxEdgeUpgrade(apisession, org_id=str(org_id), upgrade_id=str(upgrade_id))
    site_mxedge:
      list:
        operationId: listSiteMxEdgeUpgrades
        function: mistapi.api.v1.sites.mxedges.listSiteMxEdgeUpgrades(apisession, site_id=str(site_id))
      get:
        operationId: getSiteMxEdgeUpgrade
        function: mistapi.api.v1.sites.mxedges.getSiteMxEdgeUpgrade(apisession, site_id=str(site_id), upgrade_id=str(upgrade_id))
    ssr:
      list:
        operationId: listOrgSsrUpgrades
        function: mistapi.api.v1.orgs.ssr.listOrgSsrUpgrades(apisession, org_id=str(org_id))
      get:
        operationId: getOrgSsrUpgrade
        function: mistapi.api.v1.orgs.ssr.getOrgSsrUpgrade(apisession, org_id=str(org_id), upgrade_id=str(upgrade_id))
    available_device_versions:
      list:
        operationId: listOrgAvailableDeviceVersions
        function: mistapi.api.v1.orgs.devices.listOrgAvailableDeviceVersions(apisession, org_id=str(org_id), type=firmware_type.value if firmware_type else None, model=model if model else None)
    available_ssr_versions:
      list:
        operationId: listOrgAvailableSsrVersions
        function: mistapi.api.v1.orgs.ssr.listOrgAvailableSsrVersions(apisession, org_id=str(org_id), channel=channel.value if channel else "stable", mac=mac if mac else None)

getInsightMetrics:
  type: tool_consolidation
  tags: [sites_insights]
  description: Get insight metrics for a given object
  read_only_hint: true
  destructive_hint: false
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the Mist Site
      required: true
    - name: object_type
      schema:
        type: string
      description: Type of object to retrieve metrics for
      required: true
    - name: metric
      schema:
        type: string
      description: Name of the metric to retrieve. Use the tool`mist_get_constants` with `object_type=insight_metrics` to see available metrics
      required: true
    - name: mac
      schema:
        type: string
      description: MAC address of the client or device to retrieve metrics for. Required if object_type is 'client', 'ap', 'mxedge' or 'switch'
      required: false
    - name: device_id
      schema:
        type: string
        format: uuid
      description: ID of the gateway device to retrieve metrics for. Required if object_type is 'gateway'
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: duration
      schema:
        type: string
      description: Duration like 7d, 2w
      required: false
    - name: interval
      schema:
        type: string
      description: Aggregation works by giving a time range plus interval (e.g. 1d, 1h, 10m) where aggregation function would be applied to
      required: false
    - name: page
      schema:
        type: integer
      description: Page number
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    site:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetrics(apisession, site_id=str(site_id), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

    client:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetricsForClient(apisession, site_id=str(site_id), client_mac=str(mac), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

    ap:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetricsForDevice(apisession, site_id=str(site_id), device_mac=str(mac), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

    gateway:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetricsForGateway(apisession, site_id=str(site_id), device_id=str(device_id), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

    mxedge:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetricsForMxEdge(apisession, site_id=str(site_id), device_mac=str(mac), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

    switch:
      get:
        operationId: getSiteInsightMetrics
        function: mistapi.api.v1.sites.insights.getSiteInsightMetricsForSwitch(apisession, site_id=str(site_id), device_mac=str(mac), metric=str(metric), start=str(start), end=str(end), duration=str(duration), interval=str(interval), limit=limit, page=page)

