searchGuestAuthorization:
  type: tool_consolidation
  tags: [clients]
  description: |-
    Search for guest authorization entries in an organization or site
  read_only_hint: true
  destructive_hint: false
  parameters:
    - name: scope
      schema:
        type: string
        enum: [org, site]
      description: Whether to search in the entire organization or a specific site. If `site` is selected, the `site_id` parameter is required
      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to search for guest authorization entries in
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the site to search for guest authorization entries in
      required: false
      required_if:
        scope:
          - site
    - name: guest_mac
      schema:
        type: string
      description: MAC address of the guest to search for in the authorization entries
      required: false
    - name: wlan_id
      schema:
        type: string
        format: uuid
      description: ID of the WLAN to filter guest authorization entries by
      required: false
    - name: auth_method
      schema:
        type: string
      description: Authentication method to filter guest authorization entries by
      required: false
    - name: ssid
      schema:
        type: string
      description: SSID to filter guest authorization entries by
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  match_name: scope
  if_filter: guest_mac
  requests:
    org:
      list:
        operationId: searchOrgGuestAuthorization
        function: mistapi.api.v1.orgs.guests.searchOrgGuestAuthorization(apisession,org_id=str(org_id),wlan_id=str(wlan_id) if wlan_id else None,auth_method=auth_method if auth_method else None,ssid=ssid if ssid else None,start=str(start) if start else None,end=str(end) if end else None, limit=limit )
      get:
        operationId: getOrgGuestAuthorization
        function: mistapi.api.v1.orgs.guests.getOrgGuestAuthorization(apisession, org_id=str(org_id), guest_mac=str(guest_mac) )
    site:
      list:
        operationId: searchSiteGuestAuthorization
        function: mistapi.api.v1.sites.guests.searchSiteGuestAuthorization(apisession, site_id=str(site_id), wlan_id=str(wlan_id) if wlan_id else None, auth_method=auth_method if auth_method else None, ssid=ssid if ssid else None, start=str(start) if start else None, end=str(end) if end else None, limit=limit )
      get:
        operationId: getSiteGuestAuthorization
        function: mistapi.api.v1.sites.guests.getSiteGuestAuthorization(apisession, site_id=str(site_id), guest_mac=str(guest_mac) )

getOrgOrSiteInfo:
  type: tool_consolidation
  tags: [info]
  description: |-
    Search information about the organizations or sites
  read_only_hint: true
  destructive_hint: false
  parameters:
    - name: info_type
      schema:
        type: string
        enum: [org, site]
      description: Type of information to search for. Possible values are `org` and `site`
      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to search for information in
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the site to search for information in
      required: false
  match_name: info_type
  if_filter: site_id
  requests:
    org:
      get:
        operationId: getOrg
        function: mistapi.api.v1.orgs.orgs.getOrg(apisession, org_id=str(org_id))
    site:
      list:
        operationId: listOrgSites
        function: mistapi.api.v1.orgs.sites.listOrgSites(apisession, org_id=str(org_id))
      get:
        operationId: getSiteInfo
