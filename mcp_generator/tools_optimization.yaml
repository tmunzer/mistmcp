getSelf:
  type: tool_consolidation
  tags: [self_account]
  description: |-
    This tool can be used to retrieve information about the current user and account
    The information provided will depend on the `action_type` attribute:
    * `account_info`: will return information about the account including account ID, account name, and the list of orgs (and their respective `org_id`) the account has access to, with the permissions level (read or write) for each org
    * `api_usage`: will return information about the API usage of the account including the number of API calls made in the current hour cycle and the API call limit for the account
    * `login_failures`: will return information about the recent login failures for the account including the timestamp of the failure, the source IP address, and the reason for the failure
  read_only_hint: true
  destructive_hint: false
  match_name: action_type
  parameters:
    - name: action_type
      schema:
        type: string
        enum: [account_info, api_usage, login_failures]
      description: Type of information to retrieve about the current user and account. Possible values are `account_info`, `api_usage`, and `login_failures`
      required: true
  requests:
    account_info:
      get:
        operationId: getSelf
        function: mistapi.api.v1.self.self.getSelf(apisession)
    api_usage:
      get:
        operationId: getSelfApiUsage
        function: mistapi.api.v1.self.usage.getSelfApiUsage(apisession)
    login_failures:
      get:
        operationId: getSelfLoginFailures
        function: mistapi.api.v1.self.login_failures.getSelfLoginFailures(apisession)

getSiteRrmInfo:
  type: tool_consolidation
  tags: [sites_rrm]
  description: Retrieve Radio Resource Management (RRM) information for a site. Use current_channel_planning to get the current channel plan, current_rrm_considerations to get RRM considerations for a specific device and band, current_rrm_neighbors to list current RRM neighbor APs for a band, or events to list RRM change events over a time range.
  read_only_hint: true
  destructive_hint: false
  match_name: rrm_info_type
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID
      required: true
    - name: rrm_info_type
      schema:
        type: string
        enum:
          [
            channel_scores,
            current_channel_planning,
            current_rrm_considerations,
            current_rrm_neighbors,
            events,
          ]
      description: "Type of RRM information to retrieve: current_channel_planning returns the current channel plan for the site; current_rrm_considerations returns per-AP RRM considerations (requires device_id and band); current_rrm_neighbors lists current RRM neighbor APs for a band (requires band); events lists RRM change events over a time range"
      required: true
    - name: device_id
      schema:
        type: string
        format: uuid
      description: ID of the AP to retrieve RRM considerations for. Required when rrm_info_type is current_rrm_considerations
      required: false
      required_if:
        rrm_info_type:
          - current_rrm_considerations
    - name: band
      schema:
        type: string
        enum:
          [
            "24",
            "5",
            "5_dedicated",
            "5_selectable",
            "6",
            "6_dedicated",
            "6_selectable",
          ]
      description: 802.11 band. Required when rrm_info_type is current_rrm_considerations or current_rrm_neighbors
      required: false
      required_if:
        rrm_info_type:
          - current_rrm_considerations
          - current_rrm_neighbors
          - channel_scores
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: duration
      schema:
        type: string
      description: Time range duration (e.g. 1d, 1h, 10m). Only applicable when rrm_info_type is events
      required: false
      only_if:
        rrm_info_type:
          - events
    - name: limit
      schema:
        type: integer
        default: 200
      description: Max number of results per page. Only applicable when rrm_info_type is events
      required: false
      only_if:
        rrm_info_type:
          - events
    - name: page
      schema:
        type: integer
        default: 1
      description: Page number for pagination. Only applicable when rrm_info_type is events
      required: false
      only_if:
        rrm_info_type:
          - events
  requests:
    channel_scores:
      get:
        operationId: getSiteChannelScores
        function: mistapi.api.v1.sites.rrm.getSiteChannelScores(apisession, site_id=str(site_id), band=str(band.value), start=str(start) if start else None, end=str(end) if end else None)
    current_channel_planning:
      get:
        operationId: getSiteCurrentChannelPlanning
        function: mistapi.api.v1.sites.rrm.getSiteCurrentChannelPlanning(apisession, site_id=str(site_id))
    current_rrm_considerations:
      get:
        operationId: getSiteCurrentRrmConsiderations
        function: mistapi.api.v1.sites.rrm.getSiteCurrentRrmConsiderations(apisession, site_id=str(site_id), device_id=str(device_id), band=str(band.value))
    current_rrm_neighbors:
      get:
        operationId: listSiteCurrentRrmNeighbors
        function: mistapi.api.v1.sites.rrm.listSiteCurrentRrmNeighbors(apisession, site_id=str(site_id), band=str(band.value))
    events:
      list:
        operationId: listSiteRrmEvents
        function: mistapi.api.v1.sites.rrm.listSiteRrmEvents(apisession, site_id=str(site_id), band=band.value if band else None, start=str(start) if start else None, end=str(end) if end else None, duration=duration if duration else None, limit=limit, page=page)

getOrgLicenses:
  type: tool_consolidation
  tags: [orgs]
  description: |-
    This tool can be used to retrieve information about the licenses of an org
  read_only_hint: true
  destructive_hint: false
  parameters:
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to retrieve license information for
      required: true
    - name: response_type
      schema:
        type: string
      description: Type of license information to retrieve. `claim_status` returns the status of an asynchronous license claim operation, `by_site` returns the list of licenses for each site in the org, and `summary` returns a summary of the licenses in the org including total count and count by license type
      required: true
  match_name: response_type
  requests:
    claim_status:
      get:
        operationId: GetOrgLicenseAsyncClaimStatus
        function: mistapi.api.v1.orgs.claim.GetOrgLicenseAsyncClaimStatus(apisession, org_id=str(org_id))
    by_site:
      get:
        operationId: getOrgLicensesBySite
        function: mistapi.api.v1.orgs.licenses.getOrgLicensesBySite(apisession, org_id=str(org_id))
    summary:
      get:
        operationId: getOrgLicensesSummary
        function: mistapi.api.v1.orgs.licenses.getOrgLicensesSummary(apisession, org_id=str(org_id))

getStats:
  type: tool_consolidation
  tags: [stats]
  description: Use this tool to retrieve various statistics from Mist infrastructure including organization and site-level data. Supports stats for MxEdges, devices, BGP, OSPF, peer paths, ports, and wireless clients. Use object_id to filter results by device ID or MAC address (format varies by stats_type).
  read_only_hint: true
  destructive_hint: false
  match_name: stats_type
  parameters:
    - name: stats_type
      schema:
        type: string
        enum:
          [
            org,
            sites,
            org_mxedges,
            org_wireless_clients,
            org_devices,
            org_bgp,
            org_ospf,
            org_peer_paths,
            org_ports,
            site_mxedges,
            site_wireless_clients,
            site_devices,
            site_bgp,
            site_ospf,
            site_ports,
          ]
      description: "Type of statistics to retrieve: org, sites, org_mxedges, org_wireless_clients, org_devices, org_bgp, org_ospf, org_peer_paths, org_ports, site_mxedges, site_wireless_clients, site_devices, site_bgp, site_ospf, or site_ports"
      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: Organization ID (required for all queries)
      required: true
    - name: site_id
      schema:
        type: string
        format: uuid
      description: "Site ID (required for site-level stats: site_mxedges, site_wireless_clients, site_devices, site_bgp, site_ospf, site_ports)"
      required: false
      required_if:
        stats_type:
          - site_mxedges
          - site_wireless_clients
          - site_devices
          - site_bgp
          - site_ospf
          - site_ports
    - name: device_type
      schema:
        type: string
        enum: [ap, switch, gateway]
      description: "Device type filter (ap, switch, gateway). Only applicable when stats_type is org_devices or site_devices"
      required: false
      only_if:
        stats_type:
          - org_devices
          - site_devices
    - name: object_id
      schema:
        type: string
      description: "Filter by specific object ID or MAC address (format depends on stats_type): Mist Edge ID for mxedges, device ID for devices, MAC address for BGP/OSPF/peer_paths/ports, client MAC for wireless_clients, site ID for sites"
      required: false
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    org:
      get:
        operationId: getOrgStats
        function: mistapi.api.v1.orgs.stats.getOrgStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None )
    sites:
      list:
        operationId: listOrgSiteStats
        function: mistapi.api.v1.orgs.stats.listOrgSiteStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, limit=limit)
      get:
        operationId: getSiteStats
        function: mistapi.api.v1.sites.stats.getSiteStats(apisession, site_id=str(object_id))
    org_mxedges:
      list:
        operationId: listOrgMxEdgesStats
        function: mistapi.api.v1.orgs.stats.listOrgMxEdgesStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, limit=limit)
      get:
        operationId: getOrgMxEdgeStats
        function: mistapi.api.v1.orgs.stats.getOrgMxEdgeStats(apisession, org_id=str(org_id), mxedge_id=str(object_id))
    org_devices:
      list:
        operationId: listOrgDevicesStats
        function: mistapi.api.v1.orgs.stats.listOrgDevicesStats(apisession, org_id=str(org_id), type=device_type.value if device_type else None, start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id), limit=limit)
    org_bgp:
      list:
        operationId: searchOrgBgpStats
        function: mistapi.api.v1.orgs.stats.searchOrgBgpStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id) if object_id else None, limit=limit)
    org_ospf:
      list:
        operationId: searchOrgOspfStats
        function: mistapi.api.v1.orgs.stats.searchOrgOspfStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id) if object_id else None )
    org_peer_paths:
      list:
        operationId: searchOrgPeerPathStats
        function: mistapi.api.v1.orgs.stats.searchOrgPeerPathStats(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id) if object_id else None, limit=limit)
    org_ports:
      list:
        operationId: searchOrgSwOrGwPorts
        function: mistapi.api.v1.orgs.stats.searchOrgSwOrGwPorts(apisession, org_id=str(org_id), mac=str(object_id) if object_id else None, limit=limit)
    site_mxedges:
      list:
        operationId: listSiteMxEdgesStats
        function: mistapi.api.v1.sites.stats.listSiteMxEdgesStats(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, limit=limit)
      get:
        operationId: getSiteMxEdgeStats
        function: mistapi.api.v1.sites.stats.getSiteMxEdgeStats(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, mxedge_id=str(object_id))
    site_wireless_clients:
      list:
        operationId: listSiteWirelessClientsStats
        function: mistapi.api.v1.sites.stats.listSiteWirelessClientsStats(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, limit=limit)
      get:
        operationId: getSiteWirelessClientStats
        function: mistapi.api.v1.sites.stats.getSiteWirelessClientStats(apisession, site_id=str(site_id),  client_mac=str(object_id))
    site_devices:
      list:
        operationId: listSiteDevicesStats
        function: mistapi.api.v1.sites.stats.listSiteDevicesStats(apisession, site_id=str(site_id), type=device_type.value if device_type else None, limit=limit)
      get:
        operationId: getSiteDeviceStats
        function: mistapi.api.v1.sites.stats.getSiteDeviceStats(apisession, site_id=str(site_id), device_id=str(object_id))
    site_bgp:
      list:
        operationId: searchSiteBgpStats
        function: mistapi.api.v1.sites.stats.searchSiteBgpStats(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id) if object_id else None, limit=limit)
    site_ospf:
      list:
        operationId: searchSiteOspfStats
        function: mistapi.api.v1.sites.stats.searchSiteOspfStats(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, mac=str(object_id) if object_id else None, limit=limit)
    site_ports:
      list:
        operationId: searchSiteSwOrGwPorts
        function: mistapi.api.v1.sites.stats.searchSiteSwOrGwPorts(apisession, site_id=str(site_id), mac=str(object_id) if object_id else None, limit=limit)

searchEvents:
  type: tool_consolidation
  tags: [events]
  description: |-
    Search for events across an organization or site with flexible filtering options.

    This tool queries events from various sources including devices, MX Edge instances, and clients. You can:
    - Filter by time range using `start` and `end` (epoch seconds)
    - Filter by event type (use `mist_get_constants` tool first to discover available event types)
    - Apply source-specific filters (MAC address, text search, SSID, etc.)

    IMPORTANT: Always specify an `event_type` to limit results. Use `mist_get_constants` with:
    - `object_type=device_events` for device events
    - `object_type=mxedge_events` for MX Edge events  
    - `object_type=client_events` for WAN/wireless client events
    - `object_type=nac_events` for NAC client events
  read_only_hint: true
  destructive_hint: false
  match_name: event_source
  parameters:
    - name: event_source
      schema:
        type: string
        enum:
          [
            device,
            mxedge,
            wan_client,
            wireless_client,
            nac_client,
            roaming,
            rogue,
          ]
      description: "Event source type: device, mxedge, wan_client, wireless_client, nac_client, roaming (requires site_id), or rogue (requires site_id)"
      required: true
    - name: org_id
      schema:
        type: string
        format: uuid
      description: ID of the organization to search for events in
      required: true
    - name: event_type
      schema:
        type: string
      description: Comma-separated event types to filter by. The list of possible event types can be obtained with the `mist_get_constants` tool with `object_type=device_events` when `event_source` is `device`, `object_type=mxedge_events` when `event_source` is `mxedge`, `object_type=client_events` when `event_source` is `wan_client` or `wireless_client`, `object_type=nac_events` when `event_source` is `nac_client`
      required: false
    - name: site_id
      schema:
        type: string
        format: uuid
      description: Site ID (required for roaming/rogue events, optional for others)
      required: false
      required_if:
        event_source:
          - roaming
          - rogue
    - name: mac
      schema:
        type: string
      description: MAC address to filter by (device/WAN client/NAC client/rogue events only)
      required: false
    - name: text
      schema:
        type: string
      description: Text search in event details (device/NAC client events only)
      required: false
      only_if:
        event_source:
          - device
          - nac_client
    - name: ssid
      schema:
        type: string
      description: SSID filter (wireless_client/nac_client/rogue events only)
      required: false
      only_if:
        event_source:
          - wireless_client
          - nac_client
          - rogue
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: limit
      schema:
        type: integer
        default: 20
      description: Max number of results to return (max 1000)
      required: false
  requests:
    device:
      site_id:
        operationId: searchSiteDeviceEvents
        function: mistapi.api.v1.sites.devices.searchSiteDeviceEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None,  mac=str(mac) if mac else None, text=str(text) if text else None, limit=limit)
      org_id:
        operationId: searchOrgDeviceEvents
        function: mistapi.api.v1.orgs.devices.searchOrgDeviceEvents(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mac=str(mac) if mac else None, text=str(text) if text else None, limit=limit)
    mxedge:
      site_id:
        operationId: mxedges.searchSiteMistEdgeEvents
        function: mistapi.api.v1.sites.mxedges.searchSiteMistEdgeEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mxedge_id=f"00000000-0000-0000-1000-{str(mac)}" if mac else None, limit=limit)
      org_id:
        operationId: searchOrgMistEdgeEvents
        function: mistapi.api.v1.orgs.mxedges.searchOrgMistEdgeEvents(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mxedge_id=f"00000000-0000-0000-1000-{str(mac)}" if mac else None, limit=limit)
    wan_client:
      site_id:
        operationId: searchSiteWanClientEvents
        function: mistapi.api.v1.sites.wan_clients.searchSiteWanClientEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mac=str(mac) if mac else None, limit=limit)
      org_id:
        operationId: searchOrgWanClientEvents
        function: mistapi.api.v1.orgs.wan_clients.searchOrgWanClientEvents(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mac=str(mac) if mac else None, limit=limit)
    wireless_client:
      site_id:
        operationId: searchSiteWirelessClientEvents
        function: mistapi.api.v1.sites.clients.searchSiteWirelessClientEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, ssid=str(ssid) if ssid else None, limit=limit)
      org_id:
        operationId: searchOrgWirelessClientEvents
        function: mistapi.api.v1.orgs.clients.searchOrgWirelessClientEvents(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, ssid=str(ssid) if ssid else None, limit=limit)
    nac_client:
      site_id:
        operationId: searchSiteNacClientEvents
        function: mistapi.api.v1.sites.nac_clients.searchSiteNacClientEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mac=str(mac) if mac else None, text=str(text) if text else None, ssid=str(ssid) if ssid else None, limit=limit)
      org_id:
        operationId: searchOrgNacClientEvents
        function: mistapi.api.v1.orgs.nac_clients.searchOrgNacClientEvents(apisession, org_id=str(org_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, mac=str(mac) if mac else None, text=str(text) if text else None, ssid=str(ssid) if ssid else None, limit=limit)
    roaming:
      site_id:
        operationId: listSiteRoamingEvents
        function: mistapi.api.v1.sites.events.listSiteRoamingEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, limit=limit)
    rogue:
      site_id:
        operationId: searchSiteRogueEvents
        function: mistapi.api.v1.sites.rogues.searchSiteRogueEvents(apisession, site_id=str(site_id), start=str(start) if start else None, end=str(end) if end else None, type=str(event_type) if event_type else None, ssid=str(ssid) if ssid else None, ap_mac=str(mac) if mac else None, limit=limit)

