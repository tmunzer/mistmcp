getSiteSle:
  type: tool_consolidation
  tags: [sles]
  description: Provides Information about the Service Level Expectations (SLEs) for a given site. The SLEs are derived from the insight metrics and can be used to monitor the network user experience of the site against the defined SLEs
  read_only_hint: true
  destructive_hint: false
  match_name: object_type
  parameters:
    - name: site_id
      schema:
        type: string
        format: uuid
      description: ID of the Mist Site
      required: true
    - name: scope
      schema:
        type: string
        enum: [client, ap, gateway, mxedge, switch, site]
      description: Scope of the SLEs to retrieve. Can be 'client', 'ap', 'gateway', 'mxedge', 'switch' or 'site'
      required: true
    - name: scope_id
      schema:
        type: string
        description: ID of the object to retrieve SLEs for. Required if scope is 'client', 'ap', 'gateway', 'mxedge' or 'switch'. Optional if scope is 'site'
      required: true
    - name: metric
      schema:
        type: string
      description: Name of the metric to retrieve SLEs for. Use the tool`mist_get_constants` with `object_type=insight_metrics` to see available metrics
      required: true
    - name: object_type
      schema:
        type: string
      description: Type of object to retrieve metrics for
      required: true
    - name: start
      schema:
        type: integer
      description: Start time (epoch timestamp in seconds)
      required: false
    - name: end
      schema:
        type: integer
      description: End time (epoch timestamp in seconds)
      required: false
    - name: classifier
      schema:
        type: string
      description: Classifier name. Required when object_type is 'classifier_summary_trend'
      required: false
      required_if:
        test:
          - classifier_summary_trend
    - name: duration
      schema:
        type: string
      description: Duration like 7d, 2w
      required: false

  requests:
    summary:
      get:
        operationId: getSiteSleSummary
        function: mistapi.api.v1.sites.sle.getSiteSleSummary(apisession,site_id=str(site_id),scope=scope.value,scope_id=scope_id,metric=metric,start=str(start) if start else None,end=str(end) if end else None,duration=duration if duration else None,)

